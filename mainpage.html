<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML CSS Practice</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <header class="header-area">
      <div class="header-area__top">
        <div class="container header-area__inner">
          <a href="/" class="header-area__logo">
            <span class="logo__brand">
              B-W
              <span class="logo__icon">
                <img src="assets/icons/book-world.svg" alt="O" />
              </span>
              rld
            </span>
            <span class="logo__divider"></span>

            <span class="logo__tagline">
              We love <br />
              books
            </span>
          </a>

          <div class="search">
            <input type="text" placeholder="Type any book here" />
            <button class="search__btn">
              <img src="assets/icons/search.svg" alt="Search icon" />
            </button>
          </div>

          <nav class="header-area__policy">
            <a href="#">Privacy policy</a>
            <a href="#">Warranty</a>
            <a href="#">Shipping</a>
            <a href="#">Returns</a>
          </nav>

          <div class="header-area__actions">
            <button class="icon">
              <img src="assets/icons/purple-cart.svg" alt="Cart icon" />
            </button>

            <button class="icon icon--with-badge">
              <img src="assets/icons/wish-list.svg" alt="Heart icon" />
              <span class="badge">3</span>
            </button>

            <button class="icon">
              <img src="assets/icons/user.svg" alt="User icon" />
            </button>
          </div>
        </div>
      </div>

      <div class="header-area__bottom">
        <div class="container header-area__inner">
          <nav class="nav">
            <ul class="nav__list">
              <li class="nav__item">
                <a href="#" class="nav__link body-text">The must read</a>
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link body-text">News</a>
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link body-text"
                  >Promotion of the mount</a
                >
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link body-text">Publishes</a>
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link body-text"
                  >Subscribe to the newsletter</a
                >
              </li>
            </ul>
          </nav>

          <div class="header-area__contact">
            <span class="icon">
              <img src="assets/icons/phone.svg" alt="Phone icon" />
            </span>
            <span class="header-area__phone">+445 87 999 000</span>
            <button class="btn-outline btn-nav">Request a call</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="layout-section">
        <div class="container"></div>
      </section>
    </main>
  </body>
</html>
