<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML CSS Practice</title>

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <div class="container">
      <!-- BUTTON -->
      <section class="section">
        <h2>Button</h2>

        <div class="row">
          <button class="btn">Default</button>

          <button class="btn btn-primary">Primary</button>

          <button class="btn btn-text">Text Button</button>

          <button class="btn btn-primary btn-sm">Small Button</button>

          <button class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path
                d="M9 6L15 12L9 18"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            With Icon
          </button>
        </div>
      </section>

      <!-- BADGE -->
      <section class="section">
        <h2>Badge</h2>

        <div class="row">
          <!-- Badge số -->
          <span class="badge">1</span>
          <span class="badge">9</span>
          <span class="badge">99</span>
          <span class="badge">999+</span>
        </div>
      </section>

      <!-- INPUT -->
      <section class="section">
        <h2>Input</h2>

        <div class="row" style="max-width: 400px">
          <input class="input" placeholder="Type something..." />
        </div>
      </section>

      <!-- PAGINATION -->
      <section class="section">
        <h2>Pagination Dots</h2>

        <div class="pagination" style="display: flex; gap: 8px">
          <span class="pagination-dot active"></span>
          <span class="pagination-dot"></span>
          <span class="pagination-dot"></span>
          <span class="pagination-dot"></span>
        </div>
      </section>
      <section class="section">
        <h2>Icon (IMG)</h2>

        <div class="row">
          <!-- Standalone -->
          <img src="assets/icons/heart.svg" alt="Heart icon" class="icon" />

          <!-- Trong button -->
          <button class="btn btn-primary">
            <img src="assets/icons/heart.svg" alt="" class="icon" />
            Wishlist
          </button>

          <!-- Icon nhỏ -->
          <button class="btn btn-text btn-sm">
            <img src="assets/icons/heart.svg" alt="" class="icon" />
            Like
          </button>
        </div>
      </section>
    </div>
  </body>
</html>
