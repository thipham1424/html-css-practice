<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML CSS Practice</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <div class="container">
      <section class="section">
        <h2>Button</h2>

        <div class="row">
          <button class="btn btn-primary">Primary</button>

          <button class="btn btn-text">Text Button</button>

          <button class="btn btn-primary btn-sm">Small Button</button>
        </div>
      </section>

      <section class="section">
        <h2>Badge</h2>

        <div class="row">
          <span class="badge">1</span>
          <span class="badge">9</span>
          <span class="badge">99</span>
          <span class="badge">999+</span>
        </div>
      </section>

      <section class="section">
        <h2>Input</h2>

        <div class="row" style="max-width: 400px">
          <input class="input" placeholder="Type something..." />
        </div>
      </section>

      <section class="section">
        <h2>Pagination Dots</h2>

        <div class="pagination" style="display: flex; gap: 8px">
          <span class="pagination-dot active"></span>
          <span class="pagination-dot"></span>
          <span class="pagination-dot"></span>
          <span class="pagination-dot"></span>
        </div>
      </section>
      <section class="section">
        <h2>Icon (IMG)</h2>

        <div class="row">
          <img src="assets/icons/heart.svg" alt="Heart icon" class="icon" />

          <button class="btn btn-primary">
            <img src="assets/icons/heart.svg" alt="" class="icon" />
            Wishlist
          </button>

          <button class="btn btn-text btn-sm">
            <img src="assets/icons/heart.svg" alt="" class="icon" />
            Like
          </button>
        </div>
      </section>
      <section class="section">
        <div class="slider-control">
          <button class="slider-control__btn">
            <svg class="slider-control__icon" viewBox="0 0 25 25" fill="none">
              <path
                d="M15.0208 19.0264L8.01103 12.0167L15.0208 5.00696"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>

          <button class="slider-control__btn">
            <svg class="slider-control__icon" viewBox="0 0 25 25" fill="none">
              <path
                d="M9.01245 5.00692L16.0222 12.0166L9.01245 19.0264"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </section>
      <section class="section">
        <div class="quantity">
          <button class="quantity__btn">-</button>
          <span class="quantity__number">1</span>
          <button class="quantity__btn">+</button>
        </div>
      </section>
      <section class="section">
        <nav class="breadcrumb">
          <a href="#">Home</a>
          <span class="breadcrumb__separator">></span>
          <a href="#">Fantasy books</a>
          <span class="breadcrumb__separator">></span>
          <span class="breadcrumb__current">Chain of Gold</span>
        </nav>
      </section>
      <section class="section">
        <div class="search">
          <input type="text" placeholder="Type any book here" />
          <button class="search__btn">
            <img src="assets/icons/search.svg" alt="Search icon" />
          </button>
        </div>
      </section>
    </div>
  </body>
</html>
