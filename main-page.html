<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML CSS Practice</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <header class="header-area">
      <div class="header-area__top">
        <div class="container header-area__inner">
          <a href="/" class="header-area__logo">
            <span class="logo__brand">
              B-W
              <span class="logo__icon">
                <img
                  src="assets/icons/book-world.svg"
                  alt="o"
                  class="logo_icon-icon"
                />
              </span>
              rld
            </span>
            <span class="logo__divider"></span>

            <span class="logo__tagline">
              We love <br />
              books
            </span>
          </a>

          <div class="search">
            <input
              class="search__input"
              type="text"
              placeholder="Type any book here"
            />
            <button class="search__btn">
              <img
                src="assets/icons/search.svg"
                alt="Search icon"
                class="icon search__btn-icon"
              />
            </button>
          </div>

          <nav class="header-area__policy">
            <a href="#">Privacy policy</a>
            <a href="#">Warranty</a>
            <a href="#">Shipping</a>
            <a href="#">Returns</a>
          </nav>

          <div class="header-area__actions">
            <button class="header-area__icon">
              <img
                class="header-area__icon-img"
                src="assets/icons/purple-cart.svg"
                alt="Cart icon"
              />
            </button>

            <button class="header-area__icon header-area__icon--with-badge">
              <img
                class="header-area__icon-img"
                src="assets/icons/wish-list.svg"
                alt="Heart icon"
              />
              <span class="badge header-area__badge">3</span>
            </button>

            <button class="header-area__icon">
              <img
                class="header-area__icon-img"
                src="assets/icons/user.svg"
                alt="User icon"
              />
            </button>
          </div>
        </div>
      </div>

      <div class="header-area__bottom">
        <div class="container header-area__inner">
          <nav class="nav">
            <ul class="nav__list">
              <li class="nav__item">
                <a href="#" class="nav__link body-text">The must read</a>
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link body-text">News</a>
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link body-text"
                  >Promotion of the mount</a
                >
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link body-text">Publishes</a>
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link body-text"
                  >Subscribe to the newsletter</a
                >
              </li>
            </ul>
          </nav>

          <div class="header-area__contact">
            <span>
              <img class="icon" src="assets/icons/phone.svg" alt="Phone icon" />
            </span>
            <a href="tel:+44587999000" class="header-area__phone">
              +445 87 999 000
            </a>
            <button class="btn btn--outline btn-nav">Request a call</button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
