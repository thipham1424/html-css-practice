<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>B-World | Ecommerce Book Store</title>
    <link rel="icon" href="assets/icons/book-world.svg" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <section class="container layout-section">
      <div class="gallery">
        <div class="gallery__thumbnails">
          <div class="gallery__thumb-box gallery__thumb-box--active">
            <img
              src="assets/images/gallery-after.jpg"
              class="gallery__thumb"
              alt="Gallery Book Image"
            />
          </div>

          <div class="gallery__thumb-box">
            <img
              src="assets/images/gallery-before.jpg"
              class="gallery__thumb"
              alt="Gallery Book Image"
            />
          </div>

          <div class="gallery__thumb-box">
            <img
              src="assets/images/gallery-back.jpg"
              class="gallery__thumb"
              alt="Gallery Book Image"
            />
          </div>

          <div class="gallery__thumb-box">
            <img
              src="assets/images/main-product-page.jpg"
              class="gallery__thumb"
              alt="Gallery Book Image"
            />
          </div>
        </div>

        <div class="gallery__main">
          <div class="gallery__badge">
            <span class="gallery__badge-icon">
              <img src="assets/icons/bi-book.svg" alt="Book icon" />
            </span>
            <span>flips a few pages</span>
          </div>
          <img
            src="assets/images/main-product-page.jpg"
            class="gallery__main-image"
            alt="Main Book Image"
          />
          <div class="slider-control gallery__slider">
            <button class="slider-control__btn">
              <svg class="slider-control__icon" viewBox="0 0 25 25" fill="none">
                <path
                  d="M15.0208 19.0264L8.01103 12.0167L15.0208 5.00696"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>

            <button class="slider-control__btn">
              <svg class="slider-control__icon" viewBox="0 0 25 25" fill="none">
                <path
                  d="M9.01245 5.00692L16.0222 12.0166L9.01245 19.0264"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
