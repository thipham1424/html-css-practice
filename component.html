<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >

    <title>B-World | Ecommerce Book Store</title>
    <meta
      name="description"
      content="Online bookstore - discover and buy your favorite books."
    >

    <link rel="icon" href="assets/icons/book-world.svg" type="image/svg+xml" >

    <link rel="preconnect" href="https://fonts.googleapis.com" >
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin >
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    >

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <link rel="stylesheet" href="./assets/css/main.css" >
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <div class="container">
      <section class="layout-section">
        <h2>Button</h2>

        <div>
          <button type="button" class="btn btn-primary">Primary</button>

          <button type="button" class="btn btn-outline-primary">Text Button</button>

          <button type="button" class="btn btn-outline-secondary">Small Button</button>
        </div>
      </section>

      <section class="layout-section">
        <h2>Badge</h2>

        <div>
          <span class="position-absolute top-0 translate-middle badge rounded-pill">1</span>
          <span class="position-absolute top-0 translate-middle badge rounded-pill">9</span>
          <span class="position-absolute top-0 translate-middle badge rounded-pill">99</span>
          <span class="position-absolute top-0 translate-middle badge rounded-pill">999+</span>
        </div>
      </section>

      <section class="layout-section">
        <h2>Input</h2>

        <div class="d-none d-lg-flex align-items-center search">
          <form class="d-flex align-items-center">
            <label for="search-input" class="sr-only">Search books</label>
            <input
              id="search-input"
              class="search-input"
              type="text"
              placeholder="Type any book here"
            >
            <button
              type="submit"
              class="d-flex align-items-center justify-content-center cursor-pointer search__btn"
              aria-label="Search for books"
            >
              <img
                src="assets/icons/search.svg"
                alt="Search icon"
                class="icon search-btn-icon"
              >
            </button>
          </form>
        </div>
        <form class="d-flex flex-column mt-4 newsletter-form">
          <label for="newsletter-name" class="sr-only">Your name</label>
          <input
            id="newsletter-name"
            type="text"
            placeholder="Your name"
            class="newsletter-input"
          >
          <label for="newsletter-email" class="sr-only">Your e-mail</label>
          <input
            id="newsletter-email"
            type="email"
            placeholder="Your e-mail"
            class="newsletter-input"
          >
          <button type="submit" class="btn btn-primary newsletter-btn" aria-label="Subscribe">
            Subscribe
          </button>
        </form>
      </section>

      <section class="layout-section">
        <h2>Pagination Dots</h2>

        <div class="d-none d-lg-flex flex-column gap-4 me-2 hero-pagination">
          <span class="hero-pagination-dot active"></span>
          <span class="hero-pagination-dot"></span>
          <span class="hero-pagination-dot"></span>
          <span class="hero-pagination-dot"></span>
        </div>
      </section>
      <section class="layout-section">
        <h2>Icon (IMG)</h2>

        <div>
          <img src="assets/icons/heart.svg" alt="Heart icon" class="icon" >

          <button type="button" class="btn btn-primary product-card-cart" aria-label="Add to cart">
            <img
              src="assets/icons/white-cart.svg"
              alt="Cart"
              class="icon"
            >
            Add to cart
          </button>
        </div>
      </section>
      <section class="layout-section">
        <div
          class="d-flex gap-3 align-items-center justify-content-center hero__slider-secondary"
        >
          <button type="button" class="btn-outline-primary slider-btn" aria-label="Previous slide">
            <svg class="icon">
              <use href="assets/icons/sprite.svg#chevron-left"></use>
            </svg>
          </button>

          <button type="button" class="btn-outline-primary slider-btn" aria-label="Next slide">
            <svg class="icon">
              <use href="assets/icons/sprite.svg#chevron-right"></use>
            </svg>
          </button>
        </div>
      </section>
      <section class="layout-section">
        <div
          class="d-inline-flex align-items-center gap-2 my-4"
          data-min="1"
          data-max="10"
        >
          <button
            type="button"
            class="d-flex align-items-center justify-content-center quantity-btn quantity-btn-minus"
            aria-label="Decrease quantity"
          >
            <img src="assets/icons/minus.svg" alt="Minus icon">
          </button>
          <span class="text-center fw-regular lh-normal quantity-number">
            1
          </span>
          <button
            type="button"
            class="d-flex align-items-center justify-content-center quantity-btn quantity-btn-plus"
            aria-label="Increase quantity"
          >
            <img src="assets/icons/plus.svg" alt="Plus icon">
          </button>
        </div>
      </section>
      <section class="layout-section">
        <nav class="d-none d-md-flex fw-regular lh-sm breadcrumb" aria-label="Breadcrumb">
          <a href="index.html" class="breadcrumb-link">Home</a>
          <span class="breadcrumb-separator"> &gt; </span>
          <a href="#" class="breadcrumb-link">Fantasy books</a>
          <span class="breadcrumb-separator"> &gt; </span>
          <span class="breadcrumb-current">Chain of Gold</span>
        </nav>
      </section>
      <section class="layout-section">
        <div class="search">
          <input
            class="search-input"
            type="text"
            placeholder="Type any book here"
          >
          <button type="button" class="search-btn" aria-label="Search">
            <img
              src="assets/icons/search.svg"
              alt="Search icon"
              class="icon search-btn"
            >
          </button>
        </div>
      </section>
      <section class="layout-section">
        <div class="d-flex flex-column flex-md-row gallery">
          <div class="d-flex flex-md-column gallery-thumbnails">
            <div
              class="d-flex justify-content-center align-items-md-center gallery-thumb-box"
              onclick="document.querySelector('.gallery-main-image').src=this.querySelector('img').src"
            >
              <img
                src="assets/images/gallery-after.jpg"
                class="gallery-thumb"
                alt="Gallery image"
              >
            </div>

            <div
              class="d-flex justify-content-center align-items-md-center gallery-thumb-box"
              onclick="document.querySelector('.gallery-main-image').src=this.querySelector('img').src"
            >
              <img
                src="assets/images/gallery-before.jpg"
                class="gallery-thumb"
                alt="Gallery image"
              >
            </div>

            <div
              class="d-flex justify-content-center align-items-md-center gallery-thumb-box"
              onclick="document.querySelector('.gallery-main-image').src=this.querySelector('img').src"
            >
              <img
                src="assets/images/gallery-back.jpg"
                class="gallery-thumb"
                alt="Gallery image"
              >
            </div>

            <div
              class="d-flex justify-content-center align-items-md-center gallery-thumb-box"
              onclick="document.querySelector('.gallery-main-image').src=this.querySelector('img').src"
            >
              <img
                src="assets/images/chain-of-gold.png"
                class="gallery-thumb"
                alt="Gallery image"
              >
            </div>
          </div>

          <div class="position-relative gallery-main">
            <div class="position-absolute d-inline-flex gallery-badge">
              <span class="icon">
                <img src="assets/icons/bi-book.svg" alt="Book icon" >
              </span>
              <span>flips a few pages</span>
            </div>
            <img
              src="assets/images/chain-of-gold.png"
              class="d-block gallery-main-image"
              alt="Chain of Gold main image">
            <div
              class="gap-2 d-none d-md-flex position-absolute gallery-slider"
            >
              <button
                type="button"
                class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center p-0 slider-btn gallery-slider-btn"
                aria-label="Next slider"
                >
                <svg class="icon slider-prev" viewBox="0 0 25 25">
                  <use href="assets/icons/sprite.svg#chevron-left"></use>
                </svg>
              </button>

              <button
                type="button"
                class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center p-0 slider-btn gallery-slider-btn"
                aria-label="Previous slider"
              >
                <svg class="icon slider-next" viewBox="0 0 25 25">
                  <use href="assets/icons/sprite.svg#chevron-right"></use>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </section>
      <section class="layout-section container">
        <div class="map position-relative newsletter-map">
          <img
            src="assets/images/map.png"
            alt="Store location map"
            class="map__image"
          >
        </div>
      </section>
      <section class="layout-section">
        <article class="product-card">
          <div
            class="position-relative product-card-image"
            onclick="window.location.href = '#'"
          >
            <img
              src="assets/images/financial-feminist.png"
              alt="Financial Feminist"
              class="d-block product-card-img"
            >
          </div>

          <div class="product-card-content">
            <h3 class="text-name-card">Financial Feminist</h3>
            <p class="body-text product-card-author">Tori Dunlap</p>
            <div
              class="d-flex align-items-end justify-content-between product-card-bottom"
            >
              <span class="text-sm product-card-price">$20.46</span>
              <button
                type="button"
                class="product-card-wishlist"
                aria-label="Add to wishlist"
              >
                <svg class="icon">
                  <use href="assets/icons/sprite.svg#wishlist"></use>
                </svg>
              </button>
            </div>

            <button type="button" class="btn btn-primary product-card-cart" aria-label="Add to cart">
              <img
                src="assets/icons/white-cart.svg"
                alt="Cart"
                class="icon"
              >
              Add to cart
            </button>
          </div>
        </article>
      </section>
      <section class="layout-section">
        <ul class="nav">
          <li class="nav-item">
            <a class="p-0 nav-link" href="#hero">The must read</a>
          </li>
          <li class="nav-item">
            <a class="p-0 nav-link" href="#benefit">News</a>
          </li>
          <li class="nav-item">
            <a class="p-0 nav-link" href="#selected-for-you"
              >Promotion of the mount</a
            >
          </li>
          <li class="nav-item">
            <a class="p-0 nav-link" href="#you-must-buy-it-now">Publishes</a>
          </li>
          <li class="nav-item">
            <a class="p-0 nav-link" href="#newsletter"
              >Subscribe to the newsletter</a
            >
          </li>
        </ul>
      </section>
    </div>
  </body>
</html>
